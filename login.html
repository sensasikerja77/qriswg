<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login QRIS Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; }
    .login-box { background: #1e293b; padding: 40px 30px; border-radius: 16px; text-align: center; color: white; width: 320px; }
    h2 { color: #e94560; margin-bottom: 24px; }
    input { width: 100%; padding: 12px; margin: 12px 0; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: white; }
    button { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .error { color: #e94560; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>🔐 Admin QRIS</h2>
    <input type="password" id="pw" placeholder="Password" autofocus>
    <button onclick="login()">Login</button>
    <p class="error" id="error">❌ Password salah</p>
  </div>
  <script>
    const PASSWORD = 'admin123'; // ⚠️ GANTI
    function login() {
      if (document.getElementById('pw').value === PASSWORD) {
        sessionStorage.setItem('qrlogin', '1');
        location.href = 'index.html';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }
  </script>
</body>
</html>
