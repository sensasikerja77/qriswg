<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin QRIS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; }
    .login-box { background: #16213e; padding: 40px 30px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; color: #eee; width: 320px; }
    h2 { margin-bottom: 24px; color: #e94560; }
    input { padding: 12px; width: 100%; margin: 12px 0; border: 1px solid #0f3460; border-radius: 6px; background: #0f3460; color: #eee; font-size: 14px; }
    input:focus { outline: none; border-color: #e94560; }
    button { padding: 12px 0; width: 100%; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; }
    button:hover { background: #c23152; }
    .error { color: #e94560; margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>🔐 Admin QRIS</h2>
    <input type="password" id="pw" placeholder="Masukkan password" autofocus>
    <button onclick="login()">Login</button>
    <p class="error" id="error"></p>
  </div>

  <script>
    // ⚠️ GANTI PASSWORD DI SINI
    const PASSWORD = 'admin123';

    function login() {
      const input = document.getElementById('pw').value;
      if (input === PASSWORD) {
        sessionStorage.setItem('qrlogin', '1');
        window.location.href = 'index.html';
      } else {
        document.getElementById('error').textContent = '❌ Password salah!';
      }
    }
    // Enter key untuk login
    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
