<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login QRIS Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            margin: 0;
            padding: 20px;
        }

        .login-container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h2 {
            color: #e94560;
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 2px solid #334155;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #e94560;
            background: rgba(15, 23, 42, 1);
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }

        input:focus + i,
        .input-group:focus-within i {
            color: #e94560;
        }

        input::placeholder {
            color: #64748b;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            font-size: 16px;
            background: none;
            border: none;
            padding: 0;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #e94560;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e94560 0%, #c23152 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            color: #e94560;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
            font-size: 14px;
            animation: shake 0.5s ease-in-out;
        }

        .error-message i {
            margin-right: 8px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            color: #94a3b8;
            font-size: 14px;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            accent-color: #e94560;
        }

        .additional-links {
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }

        .additional-links a {
            color: #e94560;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .additional-links a:hover {
            color: #f0627d;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                border-radius: 16px;
            }

            h2 {
                font-size: 20px;
            }

            input, button {
                font-size: 14px;
                padding: 12px 16px 12px 40px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🔐</div>
        <h2>Admin QRIS</h2>
        <p class="subtitle">Masukkan password untuk melanjutkan</p>

        <form id="loginForm" autocomplete="off">
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Masukkan password" 
                    autofocus
                    required
                >
                <button 
                    type="button" 
                    class="password-toggle" 
                    id="togglePassword"
                    title="Tampilkan password"
                >
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Ingat saya</label>
            </div>

            <button type="submit" id="loginButton">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Password salah. Silakan coba lagi.</span>
        </div>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i>
            Login berhasil! Mengalihkan...
        </div>

        <div class="additional-links">
            <a href="#" onclick="forgotPassword()">Lupa password?</a> • 
            <a href="#" onclick="contactSupport()">Bantuan</a>
        </div>
    </div>

    <script>
        // Konfigurasi
        const CONFIG = {
            PASSWORD: 'admin123',
            MAX_ATTEMPTS: 5,
            LOCKOUT_TIME: 5 * 60 * 1000, // 5 menit
            REDIRECT_DELAY: 800,
            REMEMBER_ME_DAYS: 7
        };

        // State
        let state = {
            loginAttempts: 0,
            isLocked: false,
            lockoutTimer: null
        };

        // DOM Elements
        const elements = {
            password: document.getElementById('password'),
            togglePassword: document.getElementById('togglePassword'),
            loginForm: document.getElementById('loginForm'),
            loginButton: document.getElementById('loginButton'),
            errorMessage: document.getElementById('errorMessage'),
            errorText: document.getElementById('errorText'),
            successMessage: document.getElementById('successMessage'),
            rememberMe: document.getElementById('rememberMe')
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkRememberedSession();
            checkLockoutStatus();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Toggle password visibility
            elements.togglePassword.addEventListener('click', togglePasswordVisibility);
            
            // Form submission
            elements.loginForm.addEventListener('submit', handleLogin);
            
            // Enter key on password field
            elements.password.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleLogin(e);
                }
            });

            // Clear error on input
            elements.password.addEventListener('input', () => {
                if (elements.errorMessage.style.display === 'block') {
                    elements.errorMessage.style.display = 'none';
                }
            });
        }

        function togglePasswordVisibility() {
            const type = elements.password.getAttribute('type') === 'password' ? 'text' : 'password';
            elements.password.setAttribute('type', type);
            
            const icon = elements.togglePassword.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            // Check if locked out
            if (state.isLocked) {
                showError('Terlalu banyak percobaan. Silakan coba lagi nanti.');
                return;
            }

            const password = elements.password.value.trim();
            
            // Validation
            if (!password) {
                showError('Password tidak boleh kosong');
                shakeElement(elements.password);
                return;
            }

            if (password.length < 6) {
                showError('Password minimal 6 karakter');
                shakeElement(elements.password);
                return;
            }

            // Disable button and show loading
            setLoadingState(true);

            // Simulate async operation
            try {
                await simulateAsyncOperation();
                
                if (password === CONFIG.PASSWORD) {
                    handleLoginSuccess();
                } else {
                    handleLoginFailure();
                }
            } catch (error) {
                showError('Terjadi kesalahan. Silakan coba lagi.');
            } finally {
                setLoadingState(false);
            }
        }

        function handleLoginSuccess() {
            // Reset attempts
            state.loginAttempts = 0;
            
            // Handle remember me
            if (elements.rememberMe.checked) {
                setRememberedSession();
            }
            
            // Set login session
            sessionStorage.setItem('qrlogin', '1');
            
            // Show success message
            elements.successMessage.style.display = 'block';
            elements.errorMessage.style.display = 'none';
            
            // Redirect after delay
            setTimeout(() => {
                window.location.href = 'index.html';
            }, CONFIG.REDIRECT_DELAY);
        }

        function handleLoginFailure() {
            state.loginAttempts++;
            
            const remainingAttempts = CONFIG.MAX_ATTEMPTS - state.loginAttempts;
            
            if (state.loginAttempts >= CONFIG.MAX_ATTEMPTS) {
                lockoutUser();
                showError('Terlalu banyak percobaan. Akun dikunci selama 5 menit.');
            } else {
                showError(`Password salah. ${remainingAttempts} percobaan tersisa.`);
            }
            
            shakeElement(elements.password);
            elements.password.value = '';
            elements.password.focus();
        }

        function showError(message) {
            elements.errorText.textContent = message;
            elements.errorMessage.style.display = 'block';
            elements.successMessage.style.display = 'none';
        }

        function setLoadingState(isLoading) {
            elements.loginButton.disabled = isLoading;
            if (isLoading) {
                elements.loginButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            } else {
                elements.loginButton.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        }

        function shakeElement(element) {
            element.style.animation = 'none';
            element.offsetHeight; // Trigger reflow
            element.style.animation = 'shake 0.5s ease-in-out';
            element.addEventListener('animationend', () => {
                element.style.animation = '';
            }, { once: true });
        }

        function lockoutUser() {
            state.isLocked = true;
            elements.password.disabled = true;
            elements.loginButton.disabled = true;
            
            const lockoutEnd = Date.now() + CONFIG.LOCKOUT_TIME;
            localStorage.setItem('qrlogin_lockout', lockoutEnd.toString());
            
            // Update timer display
            updateLockoutTimer(lockoutEnd);
        }

        function updateLockoutTimer(lockoutEnd) {
            clearInterval(state.lockoutTimer);
            
            state.lockoutTimer = setInterval(() => {
                const remaining = lockoutEnd - Date.now();
                
                if (remaining <= 0) {
                    clearInterval(state.lockoutTimer);
                    state.isLocked = false;
                    elements.password.disabled = false;
                    elements.loginButton.disabled = false;
                    elements.errorMessage.style.display = 'none';
                    localStorage.removeItem('qrlogin_lockout');
                    showError(''); // Clear error
                } else {
                    const minutes = Math.floor(remaining / 60000);
                    const seconds = Math.floor((remaining % 60000) / 1000);
                    showError(`Akun dikunci. Coba lagi dalam ${minutes}:${seconds.toString().padStart(2, '0')}`);
                }
            }, 1000);
        }

        function checkLockoutStatus() {
            const lockoutEnd = localStorage.getItem('qrlogin_lockout');
            if (lockoutEnd) {
                const endTime = parseInt(lockoutEnd);
                if (Date.now() < endTime) {
                    lockoutUser();
                    state.isLocked = true;
                    updateLockoutTimer(endTime);
                } else {
                    localStorage.removeItem('qrlogin_lockout');
                }
            }
        }

        function setRememberedSession() {
            const expiry = Date.now() + (CONFIG.REMEMBER_ME_DAYS * 24 * 60 * 60 * 1000);
            localStorage.setItem('qrlogin_remembered', expiry.toString());
        }

        function checkRememberedSession() {
            const remembered = localStorage.getItem('qrlogin_remembered');
            if (remembered && Date.now() < parseInt(remembered)) {
                elements.rememberMe.checked = true;
            }
        }

        function simulateAsyncOperation() {
            return new Promise(resolve => setTimeout(resolve, 300));
        }

        // Utility functions for additional links
        function forgotPassword() {
            alert('Silakan hubungi administrator sistem untuk reset password.');
        }

        function contactSupport() {
            alert('Hubungi dukungan teknis di: support@qrisadmin.com');
        }

        // Clear remembered session on logout (can be called from other pages)
        window.clearRememberedSession = function() {
            localStorage.removeItem('qrlogin_remembered');
        };
    </script>
</body>
</html>
