<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor QRIS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
    nav { background: #0f172a; color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    nav .brand { font-weight: 700; font-size: 20px; color: #e94560; }
    nav .links a { color: #cbd5e1; text-decoration: none; margin-left: 24px; font-weight: 500; }
    nav .links a.active { color: white; }
    nav button { background: rgba(255,255,255,0.1); border: none; color: #e2e8f0; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }
    .store-block { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; margin-bottom: 24px; }
    textarea { width: 100%; height: 180px; font-family: 'Fira Code', monospace; font-size: 13px; border: 1px solid #cbd5e1; border-radius: 10px; padding: 12px; resize: vertical; }
    .opt-name-input { font-weight: 600; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 8px; }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; margin-right: 8px; }
    .btn-save { background: #10b981; color: white; }
    .btn-add { background: #3b82f6; color: white; }
    .btn-delete { background: #e94560; color: white; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #0f172a; color: white; padding: 12px 24px; border-radius: 12px; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('qrlogin')) window.location.href = 'login.html';
  </script>
  <nav>
    <div class="brand">⚡ QRIS Admin</div>
    <div class="links">
      <a href="index.html">📊 Dashboard</a>
      <a href="editor.html" class="active">✏️ Editor</a>
    </div>
    <button onclick="logout()">Logout</button>
  </nav>
  <div class="container" id="editorContainer"></div>
  <div class="toast" id="toast"></div>

  <script>
    (function() {
      let CONFIG = {};
      try { CONFIG = JSON.parse(localStorage.adminConfig || '{}'); } catch(e) {}
      const container = document.getElementById('editorContainer');
      const toastEl = document.getElementById('toast');

      if (!CONFIG.token || !CONFIG.rawUrl) {
        container.innerHTML = '<p>⚠️ Silakan isi konfigurasi di <a href="index.html">Dashboard</a> terlebih dahulu.</p>';
        return;
      }

      let data = {};
      loadFromGist();

      async function loadFromGist() {
        try {
          const res = await fetch(CONFIG.rawUrl + '?t=' + Date.now());
          if (!res.ok) throw new Error('Gagal fetch config');
          data = await res.json();
          renderEditor();
        } catch(e) {
          showToast('❌ Gagal memuat data');
        }
      }

      function renderEditor() {
        if (!container) return;
        container.innerHTML = '';
        Object.entries(data.stores).forEach(([key, store]) => {
          const div = document.createElement('div');
          div.className = 'store-block';
          div.innerHTML = `<h3>🏪 ${store.name} <small style="color:#64748b;">(${key})</small></h3>`;
          store.script_options.forEach((opt, i) => {
            div.innerHTML += `
              <div style="margin-top:16px;">
                <input class="opt-name-input" value="${opt.name}" data-key="${key}" data-idx="${i}">
                <textarea data-key="${key}" data-idx="${i}">${opt.code || ''}</textarea>
                <button class="btn btn-delete" onclick="deleteOption('${key}',${i})">🗑 Hapus</button>
              </div>`;
          });
          div.innerHTML += `
            <div style="margin-top:16px;">
              <button class="btn btn-add" onclick="addOption('${key}')">➕ Tambah Opsi</button>
              <button class="btn btn-save" onclick="saveStore('${key}')">💾 Simpan ke Gist</button>
              <span id="status-${key}" style="margin-left:12px;"></span>
            </div>`;
          container.appendChild(div);
        });
      }

      window.addOption = function(key) {
        data.stores[key].script_options.push({ name: 'Opsi Baru', code: '' });
        renderEditor();
      };

      window.deleteOption = function(key, idx) {
        if (data.stores[key].script_options.length <= 1) return alert('Minimal 1 opsi.');
        data.stores[key].script_options.splice(idx, 1);
        if (data.stores[key].active_index >= data.stores[key].script_options.length)
          data.stores[key].active_index = data.stores[key].script_options.length - 1;
        renderEditor();
      };

      window.saveStore = async function(key) {
        if (!confirm('Simpan perubahan script untuk ' + key + '?')) return;
        const store = data.stores[key];
        
        document.querySelectorAll(`.opt-name-input[data-key="${key}"]`).forEach((inp,i) => {
          if (store.script_options[i]) store.script_options[i].name = inp.value;
        });
        document.querySelectorAll(`textarea[data-key="${key}"]`).forEach((ta,i) => {
          if (store.script_options[i]) store.script_options[i].code = ta.value;
        });

        const st = document.getElementById('status-'+key);
        st.textContent = '⏳';

        try {
          const gistUrl = `https://api.github.com/gists/${CONFIG.gistId}`;
          const gistRes = await fetch(gistUrl, {
            headers: { 'Authorization': `token ${CONFIG.token}` }
          });
          if (!gistRes.ok) throw new Error('Gagal ambil gist');
          const gistData = await gistRes.json();

          const latestConfig = JSON.parse(gistData.files['config.json'].content);
          let logs = [];
          try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e) {}

          latestConfig.stores[key] = JSON.parse(JSON.stringify(store));

          logs.push({
            timestamp: new Date().toISOString(),
            store: key,
            action: 'Edit kode script',
            user_agent: navigator.userAgent
          });

          const updateRes = await fetch(gistUrl, {
            method: 'PATCH',
            headers: {
              'Authorization': `token ${CONFIG.token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              files: {
                'config.json': { content: JSON.stringify(latestConfig, null, 2) },
                'log.json': { content: JSON.stringify(logs, null, 2) }
              }
            })
          });

          if (!updateRes.ok) {
            const errText = await updateRes.text();
            throw new Error('Gagal menyimpan: ' + errText);
          }

          st.textContent = '✅';
          showToast('✅ Tersimpan ke Gist');
          await loadFromGist();
        } catch(e) {
          st.textContent = '❌';
          showToast('❌ ' + e.message);
        }
        setTimeout(() => st.textContent = '', 2000);
      };

      function showToast(msg) {
        if (!toastEl) return;
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 3000);
      }

      window.logout = function() {
        sessionStorage.removeItem('qrlogin');
        window.location.href = 'login.html';
      };
    })();
  </script>
</body>
</html>
