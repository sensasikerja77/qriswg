<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor QRIS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f5f5f5; margin: 0; }
    h2 { color: #333; }
    button { padding: 8px 14px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin-right: 5px; transition: background 0.2s; }
    .btn-add { background: #3b82f6; color: white; }
    .btn-add:hover { background: #2563eb; }
    .btn-save { background: #10b981; color: white; }
    .btn-save:hover { background: #059669; }
    .btn-save:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-del { background: #ef4444; color: white; }
    .btn-del:hover { background: #dc2626; }
    .btn-del-store { background: #dc2626; color: white; font-size: 12px; padding: 4px 10px; }
    .btn-del-store:hover { background: #991b1b; }
    .btn-logout { background: #e94560; color: white; float: right; }
    .toolbar { margin-bottom: 15px; overflow: hidden; display: flex; justify-content: space-between; align-items: center; }
    .toolbar-left { display: flex; align-items: center; gap: 15px; }
    .toolbar a { text-decoration: none; color: #1e293b; font-weight: bold; }
    .status { font-size: 13px; margin-left: 8px; font-weight: bold; }
    
    /* === STYLE ACCORDION TOKO === */
    .store { 
      background: white; 
      margin-bottom: 10px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
      border-radius: 8px; 
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }
    
    /* Header toko (selalu terlihat, bisa diklik) */
    .store-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 14px 20px; 
      cursor: pointer; 
      background: #1e293b;
      color: white;
      user-select: none;
      transition: background 0.2s;
    }
    .store-header:hover { background: #334155; }
    
    .store-header-left { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      flex: 1;
    }
    .store-name { font-size: 16px; font-weight: bold; }
    .store-id { 
      font-size: 12px; 
      background: rgba(255,255,255,0.15); 
      padding: 2px 8px; 
      border-radius: 4px; 
      font-family: monospace;
    }
    .store-count { 
      font-size: 12px; 
      background: #10b981; 
      padding: 2px 8px; 
      border-radius: 4px; 
      color: white;
    }
    .toggle-icon { 
      font-size: 14px; 
      transition: transform 0.3s ease; 
      color: white;
    }
    .store.expanded .toggle-icon { transform: rotate(180deg); }
    
    /* Body toko (tersembunyi default) */
    .store-body { 
      display: none; 
      padding: 20px; 
      background: #fafafa;
      border-top: 1px solid #e5e7eb;
    }
    .store.expanded .store-body { display: block; }
    
    /* Script item di dalam toko */
    .opt-item { 
      background: white; 
      border: 1px solid #e5e7eb; 
      border-radius: 6px; 
      padding: 12px; 
      margin: 10px 0; 
    }
    .opt-item input { 
      width: 100%; 
      padding: 8px; 
      margin-bottom: 8px; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
      font-size: 14px; 
      box-sizing: border-box; 
      font-weight: bold; 
    }
    textarea { 
      width: 100%; 
      height: 150px; 
      font-family: 'Courier New', monospace; 
      font-size: 13px; 
      padding: 8px; 
      margin: 8px 0; 
      box-sizing: border-box; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
      resize: vertical; 
    }
    
    .store-actions { 
      margin-top: 15px; 
      padding-top: 15px; 
      border-top: 1px solid #eee; 
    }
    
    .add-store-form { 
      background: #e0f2fe; 
      border: 1px solid #7dd3fc; 
      padding: 15px; 
      border-radius: 8px; 
      margin-bottom: 20px; 
      display: none; 
    }
    .add-store-form input { 
      padding: 8px; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
      margin-right: 10px; 
      width: 200px; 
    }
    
    .empty-hint { 
      color: #9ca3af; 
      font-style: italic; 
      text-align: center; 
      padding: 20px;
    }
  </style>
</head>
<body>
  <script>if (!sessionStorage.getItem('qrlogin')) location.href = 'login.html';</script>

  <div class="toolbar">
    <div class="toolbar-left">
      <h2 style="margin: 0;">✏️ Editor Script QRIS</h2>
      <a href="index.html">📊 Kembali ke Dashboard</a>
    </div>
    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
  </div>

  <div class="add-store-form" id="addStoreForm">
    <h4 style="margin-top: 0; color: #0369a1;">➕ Tambah Toko Baru</h4>
    <input type="text" id="newStoreId" placeholder="ID Toko (misal: NEW)" style="text-transform: uppercase;">
    <input type="text" id="newStoreName" placeholder="Nama Toko">
    <button class="btn-save" onclick="confirmAddStore()">💾 Simpan Toko</button>
    <button class="btn-del" onclick="toggleAddStore()">Batal</button>
  </div>

  <div style="margin-bottom: 20px;">
    <button class="btn-add" onclick="toggleAddStore()">➕ Tambah Toko Baru</button>
  </div>

  <div id="content">⏳ Memuat data dari Supabase...</div>

  <script>
    const SUPABASE_URL = 'https://tktvwdejrcrsyzilizpm.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrdHZ3ZGVqcmNyc3l6aWxpenBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NTQzMzAsImV4cCI6MjA5OTUzMDMzMH0.Ml9Iu7OsaVezLikiDX2SdMF3nRtttVU5F9brcOFnAL0';            

    let supabaseClient = null;
    let currentStores = {};
    let expandedStores = new Set(); // Track toko mana yang sedang di-expand

    if (SUPABASE_URL.includes('YOUR_PROJECT_ID') || SUPABASE_ANON_KEY.includes('YOUR_ANON')) {
      document.getElementById('content').innerHTML = '<p style="color:red; text-align:center; padding: 20px;">⚠️ ERROR: Silakan edit file <b>editor.html</b> dan masukkan SUPABASE_URL serta SUPABASE_ANON_KEY Anda.</p>';
    } else {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      loadFromSupabase();
    }

    async function loadFromSupabase() {
      document.getElementById('content').innerHTML = '⏳ Memuat data dari Supabase...';
      try {
        const { data, error } = await supabaseClient.from('stores').select('*').order('id', { ascending: true });
        if (error) throw error;
        
        currentStores = {};
        data.forEach(s => { currentStores[s.id] = s; });
        
        // Pastikan semua toko punya "TIDAK ADA QRIS" (untuk dropdown dashboard)
        await ensureNoQrisOptionForAllStores();
        
        renderEditor(currentStores);
      } catch(e) {
        document.getElementById('content').innerHTML = `<p style="color:red; text-align:center;">❌ Gagal memuat: ${e.message} <br><button class="btn-save" onclick="loadFromSupabase()">Coba Lagi</button></p>`;
      }
    }

    // Auto tambahkan "TIDAK ADA QRIS" ke toko yang belum punya (untuk dropdown dashboard)
    async function ensureNoQrisOptionForAllStores() {
      for (const key in currentStores) {
        const store = currentStores[key];
        const hasNoQris = store.script_options.some(opt => opt.name === 'TIDAK ADA QRIS');
        
        if (!hasNoQris) {
          store.script_options.unshift({ name: 'TIDAK ADA QRIS', code: '' });
          store.active_index += 1;
          
          try {
            await supabaseClient
              .from('stores')
              .update({ 
                script_options: store.script_options,
                active_index: store.active_index
              })
              .eq('id', key);
          } catch(e) {
            console.warn(`Gagal update toko ${key}:`, e);
          }
        }
      }
    }

    function escapeHtml(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // 🔥 FILTER: Sembunyikan "TIDAK ADA QRIS" dari tampilan editor
    function getEditableScripts(store) {
      return store.script_options
        .map((opt, idx) => ({ ...opt, originalIndex: idx }))
        .filter(opt => opt.name !== 'TIDAK ADA QRIS');
    }

    function renderEditor(stores) {
      let html = '';
      Object.entries(stores).forEach(([key, store]) => {
        const editableScripts = getEditableScripts(store);
        const isExpanded = expandedStores.has(key);
        
        html += `
          <div class="store ${isExpanded ? 'expanded' : ''}" id="store-${key}">
            <!-- HEADER (selalu terlihat, bisa diklik untuk expand/collapse) -->
            <div class="store-header" onclick="toggleStore('${key}')">
              <div class="store-header-left">
                <span class="store-name">${escapeHtml(store.name)}</span>
                <span class="store-id">${escapeHtml(key)}</span>
                <span class="store-count">${editableScripts.length} script</span>
              </div>
              <div style="display: flex; align-items: center; gap: 10px;">
                <button class="btn-del-store" onclick="event.stopPropagation(); deleteStore('${key}')">🗑 Hapus</button>
                <span class="toggle-icon">▼</span>
              </div>
            </div>
            
            <!-- BODY (tersembunyi default, muncul saat di-expand) -->
            <div class="store-body">
              ${editableScripts.length === 0 
                ? '<div class="empty-hint">Belum ada script. Klik "➕ Tambah Script Baru" untuk menambahkan.</div>' 
                : ''}
              
              ${editableScripts.map(opt => {
                const i = opt.originalIndex;
                return `
                  <div class="opt-item">
                    <input value="${escapeHtml(opt.name)}" id="oname-${key}-${i}" placeholder="Nama Script">
                    <textarea id="ocode-${key}-${i}" placeholder="Tempel kode JavaScript di sini...">${escapeHtml(opt.code || '')}</textarea>
                    <button class="btn-del" onclick="deleteOpt('${key}', ${i})">🗑 Hapus Script Ini</button>
                  </div>
                `;
              }).join('')}
              
              <div class="store-actions">
                <button class="btn-add" onclick="addOpt('${key}')">➕ Tambah Script Baru</button>
                <button class="btn-save" id="btn-save-${key}" onclick="saveStore('${key}')">💾 Simpan Perubahan</button>
                <span class="status" id="st-${key}"></span>
              </div>
            </div>
          </div>
        `;
      });
      document.getElementById('content').innerHTML = html || '<p style="text-align:center;">Tidak ada data toko.</p>';
    }

    // === FITUR COLLAPSE LEVEL TOKO ===
    window.toggleStore = function(key) {
      if (expandedStores.has(key)) {
        expandedStores.delete(key);
      } else {
        expandedStores.add(key);
      }
      const el = document.getElementById('store-' + key);
      if (el) el.classList.toggle('expanded');
    };
    // ==================================

    window.toggleAddStore = function() {
      const form = document.getElementById('addStoreForm');
      form.style.display = form.style.display === 'block' ? 'none' : 'block';
      if (form.style.display === 'block') {
        document.getElementById('newStoreId').focus();
      }
    };

    window.confirmAddStore = async function() {
      const idInput = document.getElementById('newStoreId');
      const nameInput = document.getElementById('newStoreName');
      
      const newId = idInput.value.trim().toUpperCase().replace(/\s+/g, '_');
      const newName = nameInput.value.trim();

      if (!newId || !newName) {
        alert('ID Toko dan Nama Toko tidak boleh kosong!');
        return;
      }

      if (currentStores[newId]) {
        alert('ID Toko sudah ada! Gunakan ID yang berbeda.');
        return;
      }

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '⏳ Menyimpan...';

      try {
        // Default: "TIDAK ADA QRIS" + 3 script kosong
        const defaultScripts = [
          { name: "TIDAK ADA QRIS", code: "" },
          { name: "QRIS HOKI", code: "" },
          { name: "QRIS FLYER", code: "" },
          { name: "QRIS RPAY", code: "" }
        ];

        const { error } = await supabaseClient
          .from('stores')
          .insert({ 
            id: newId, 
            name: newName, 
            active_index: 1,
            script_options: defaultScripts 
          });

        if (error) throw error;

        alert(`✅ Toko "${newName}" berhasil ditambahkan!`);
        idInput.value = '';
        nameInput.value = '';
        toggleAddStore();
        loadFromSupabase();
      } catch(e) {
        alert('❌ Gagal menambah toko: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '💾 Simpan Toko';
      }
    };

    window.deleteStore = async function(key) {
      const storeName = currentStores[key]?.name || key;
      if (!confirm(`⚠️ PERINGATAN!\n\nAnda akan menghapus toko "${storeName}" (ID: ${key}) beserta SEMUA script-nya.\n\nTindakan ini TIDAK BISA dibatalkan!\n\nLanjutkan?`)) return;
      
      const typedId = prompt(`Ketik ID toko "${key}" untuk konfirmasi:`);
      if (typedId !== key) {
        alert('ID tidak cocok. Penghapusan dibatalkan.');
        return;
      }

      try {
        const { error } = await supabaseClient
          .from('stores')
          .delete()
          .eq('id', key);

        if (error) throw error;

        await supabaseClient.from('logs').insert({ 
          store_id: key, 
          action: `Hapus toko: ${storeName}` 
        }).catch(e => console.warn('Gagal mencatat log:', e));

        expandedStores.delete(key);
        alert(`✅ Toko "${storeName}" berhasil dihapus!`);
        loadFromSupabase();
      } catch(e) {
        alert('❌ Gagal menghapus toko: ' + e.message);
      }
    };

    window.addOpt = function(key) {
      currentStores[key].script_options.push({ name: 'Script Baru', code: '' });
      // Pastikan toko tetap expanded setelah re-render
      expandedStores.add(key);
      renderEditor(currentStores);
      setTimeout(() => {
        const inputs = document.querySelectorAll(`#store-${key} [id^="oname-"]`);
        if (inputs.length > 0) {
          const lastInput = inputs[inputs.length - 1];
          lastInput.focus();
          lastInput.select();
          lastInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    };

    window.deleteOpt = function(key, idx) {
      const scriptName = currentStores[key].script_options[idx].name;
      if (!confirm(`Yakin ingin menghapus script "${scriptName}"?`)) return;
      
      currentStores[key].script_options.splice(idx, 1);
      
      if (idx < currentStores[key].active_index) {
        currentStores[key].active_index -= 1;
      } else if (currentStores[key].active_index >= currentStores[key].script_options.length) {
        currentStores[key].active_index = currentStores[key].script_options.length - 1;
      }
      expandedStores.add(key);
      renderEditor(currentStores);
    };

    window.saveStore = async function(key) {
      const st = document.getElementById('st-' + key);
      const btn = document.getElementById('btn-save-' + key);
      
      st.textContent = ' ⏳ Menyimpan...';
      btn.disabled = true;

      try {
        // Update data dari input ke object lokal
        currentStores[key].script_options.forEach((opt, i) => {
          const nameEl = document.getElementById(`oname-${key}-${i}`);
          const codeEl = document.getElementById(`ocode-${key}-${i}`);
          if (nameEl) opt.name = nameEl.value;
          if (codeEl) opt.code = codeEl.value;
        });

        const updatedOptions = currentStores[key].script_options;
        const activeScriptName = updatedOptions[currentStores[key].active_index]?.name || 'Unknown';

        const { error: err1 } = await supabaseClient
          .from('stores')
          .update({ script_options: updatedOptions })
          .eq('id', key);
        if (err1) throw err1;

        const { error: err2 } = await supabaseClient
          .from('logs')
          .insert({ 
            store_id: key, 
            action: `Edit script: ${activeScriptName}` 
          });
        if (err2) console.warn('Gagal mencatat log:', err2);

        st.textContent = ' ✅ Tersimpan!';
        setTimeout(() => { 
          const el = document.getElementById('st-' + key);
          if (el) el.textContent = ''; 
        }, 3000);
      } catch(e) { 
        st.textContent = ' ❌ Gagal!'; 
        alert('Error saat menyimpan: ' + e.message); 
      } finally {
        btn.disabled = false;
      }
    };

    window.logout = function() {
      sessionStorage.removeItem('qrlogin');
      location.href = 'login.html';
    };
  </script>
</body>
</html>
