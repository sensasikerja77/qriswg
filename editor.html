<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor QRIS</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .store { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; }
    textarea { width: 100%; height: 150px; font-family: monospace; }
    button { padding: 6px 12px; cursor: pointer; margin-right: 5px; }
  </style>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('qrlogin')) location.href = 'login.html';
  </script>
  
  <h2>Editor QRIS</h2>
  <div id="content">⏳ Memuat data dari Gist...</div>

  <script>
    const cfg = JSON.parse(localStorage.adminConfig || '{}');
    
    if (!cfg.rawUrl) {
      document.getElementById('content').innerHTML = '<p>⚠️ Raw URL belum diatur</p>';
    } else {
      loadFromGist();
    }

    async function loadFromGist() {
      document.getElementById('content').innerHTML = '⏳ Memuat...';
      
      try {
        const res = await fetch(cfg.rawUrl + '?t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.stores) throw new Error('Tidak ada stores');
        renderEditor(data.stores);
      } catch(e) {
        document.getElementById('content').innerHTML = `<p style="color:red;">❌ ${e.message} <button onclick="loadFromGist()">Coba Lagi</button></p>`;
      }
    }

    function renderEditor(stores) {
      let html = '';
      Object.entries(stores).forEach(([key, store]) => {
        html += `<div class="store"><h3>${store.name} (${key})</h3>`;
        store.script_options.forEach((opt, i) => {
          html += `
            <div style="margin:10px 0;">
              <input value="${opt.name}" id="oname-${key}-${i}">
              <textarea id="ocode-${key}-${i}">${opt.code || ''}</textarea>
              <button onclick="deleteOpt('${key}',${i})">🗑</button>
            </div>`;
        });
        html += `
          <button onclick="addOpt('${key}')">➕ Tambah</button>
          <button onclick="saveStore('${key}')">💾 Simpan</button>
          <span id="st-${key}"></span></div>`;
      });
      document.getElementById('content').innerHTML = html;
    }

    window.addOpt = function(key) {
      // Ambil data terbaru dulu
      fetch(cfg.rawUrl + '?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
          data.stores[key].script_options.push({ name: 'Baru', code: '' });
          renderEditor(data.stores);
        });
    };

    window.deleteOpt = function(key, idx) {
      fetch(cfg.rawUrl + '?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
          if (data.stores[key].script_options.length <= 1) return alert('Minimal 1');
          data.stores[key].script_options.splice(idx, 1);
          if (data.stores[key].active_index >= data.stores[key].script_options.length)
            data.stores[key].active_index = data.stores[key].script_options.length - 1;
          renderEditor(data.stores);
        });
    };

    window.saveStore = async function(key) {
      const st = document.getElementById('st-'+key);
      st.textContent = '⏳';
      
      try {
        // Ambil data dari form
        const gistUrl = `https://api.github.com/gists/${cfg.gistId}`;
        const gistRes = await fetch(gistUrl, {
          headers: { 'Authorization': `token ${cfg.token}` }
        });
        const gistData = await gistRes.json();
        const config = JSON.parse(gistData.files['config.json'].content);
        let logs = [];
        try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e) {}

        const store = config.stores[key];
        store.script_options.forEach((opt, i) => {
          const nameEl = document.getElementById(`oname-${key}-${i}`);
          const codeEl = document.getElementById(`ocode-${key}-${i}`);
          if (nameEl) opt.name = nameEl.value;
          if (codeEl) opt.code = codeEl.value;
        });

        logs.push({ timestamp: new Date().toISOString(), store: key, action: 'Edit' });

        const updateRes = await fetch(gistUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${cfg.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            files: {
              'config.json': { content: JSON.stringify(config, null, 2) },
              'log.json': { content: JSON.stringify(logs, null, 2) }
            }
          })
        });

        if (!updateRes.ok) throw new Error('Gagal');
        renderEditor(config.stores);
        st.textContent = '✅';
      } catch(e) {
        st.textContent = '❌';
        alert(e.message);
      }
    };

    window.logout = function() {
      sessionStorage.removeItem('qrlogin');
      location.href = 'login.html';
    };
  </script>
</body>
</html>
