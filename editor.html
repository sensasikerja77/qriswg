<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor QRIS</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; margin: 0; }
    .store { background: white; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .store h3 { margin-top: 0; color: #1e293b; border-bottom: 2px solid #e94560; padding-bottom: 8px; }
    textarea { width: 100%; height: 120px; font-family: monospace; font-size: 13px; padding: 8px; margin: 8px 0; box-sizing: border-box; }
    button { padding: 8px 14px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin-right: 5px; }
    .btn-add { background: #3b82f6; color: white; }
    .btn-save { background: #10b981; color: white; }
    .btn-del { background: #ef4444; color: white; }
    .btn-logout { background: #e94560; color: white; float: right; }
    .toolbar { margin-bottom: 15px; overflow: hidden; }
    .toolbar a { margin-left: 10px; text-decoration: none; color: #1e293b; font-weight: bold; }
  </style>
</head>
<body>
  <script>if (!sessionStorage.getItem('qrlogin')) location.href = 'login.html';</script>

  <div class="toolbar">
    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    <h2 style="display:inline-block;">✏️ Editor QRIS</h2>
    <a href="index.html">📊 Dashboard</a>
  </div>

  <div id="content">⏳ Memuat...</div>

  <script>
    const cfg = JSON.parse(localStorage.adminConfig || '{}');
    let currentStores = {};

    if (!cfg.gistId || !cfg.token) {
      document.getElementById('content').innerHTML = '<p style="color:red;">⚠️ Setup di <a href="index.html">Dashboard</a> dulu.</p>';
    } else {
      loadFromGist();
    }

    async function loadFromGist() {
      document.getElementById('content').innerHTML = '⏳ Memuat...';
      try {
        const res = await fetch(`https://api.github.com/gists/${cfg.gistId}`, { headers: { 'Authorization': `token ${cfg.token}` } });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const gistData = await res.json();
        const data = JSON.parse(gistData.files['config.json'].content);
        currentStores = data.stores;
        renderEditor(currentStores);
      } catch(e) {
        document.getElementById('content').innerHTML = `<p style="color:red;">❌ ${e.message} <button class="btn-save" onclick="loadFromGist()">Coba Lagi</button></p>`;
      }
    }

    function renderEditor(stores) {
      let html = '';
      Object.entries(stores).forEach(([key, store]) => {
        html += `<div class="store"><h3>${store.name} (${key})</h3>`;
        store.script_options.forEach((opt, i) => {
          html += `
            <div style="margin:10px 0; padding:10px; background:#f9fafb; border:1px solid #e5e7eb;">
              <input value="${opt.name}" id="oname-${key}-${i}" style="width:100%; padding:8px; margin-bottom:8px;" placeholder="Nama Script">
              <textarea id="ocode-${key}-${i}" placeholder="Kode JavaScript...">${opt.code || ''}</textarea>
              <button class="btn-del" onclick="deleteOpt('${key}',${i})">🗑 Hapus</button>
            </div>`;
        });
        html += `
          <button class="btn-add" onclick="addOpt('${key}')">➕ Tambah</button>
          <button class="btn-save" onclick="saveStore('${key}')">💾 Simpan</button>
          <span id="st-${key}"></span>
        </div>`;
      });
      document.getElementById('content').innerHTML = html;
    }

    window.addOpt = function(key) {
      currentStores[key].script_options.push({ name: 'Baru', code: '' });
      renderEditor(currentStores);
    };

    window.deleteOpt = function(key, idx) {
      if (currentStores[key].script_options.length <= 1) { alert('Minimal 1'); return; }
      if (!confirm('Hapus?')) return;
      currentStores[key].script_options.splice(idx, 1);
      if (currentStores[key].active_index >= currentStores[key].script_options.length) {
        currentStores[key].active_index = currentStores[key].script_options.length - 1;
      }
      renderEditor(currentStores);
    };

    window.saveStore = async function(key) {
      const st = document.getElementById('st-' + key);
      st.textContent = '⏳';
      try {
        currentStores[key].script_options.forEach((opt, i) => {
          const nameEl = document.getElementById(`oname-${key}-${i}`);
          const codeEl = document.getElementById(`ocode-${key}-${i}`);
          if (nameEl) opt.name = nameEl.value;
          if (codeEl) opt.code = codeEl.value;
        });

        const gistUrl = `https://api.github.com/gists/${cfg.gistId}`;
        const gistRes = await fetch(gistUrl, { headers: { 'Authorization': `token ${cfg.token}` } });
        const gistData = await gistRes.json();
        const config = JSON.parse(gistData.files['config.json'].content);
        config.stores = currentStores;

        let logs = [];
        if (gistData.files['log.json']) {
          try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e) {}
        }
        logs.push({ timestamp: new Date().toISOString(), store: key, action: 'Edit' });

        const updateRes = await fetch(gistUrl, {
          method: 'PATCH',
          headers: { 'Authorization': `token ${cfg.token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ files: { 'config.json': { content: JSON.stringify(config, null, 2) }, 'log.json': { content: JSON.stringify(logs, null, 2) } } })
        });

        if (!updateRes.ok) throw new Error('Gagal');
        st.textContent = '✅';
      } catch(e) { st.textContent = '❌'; alert(e.message); }
    };

    window.logout = function() {
      sessionStorage.removeItem('qrlogin');
      location.href = 'login.html';
    };
  </script>
</body>
</html>
