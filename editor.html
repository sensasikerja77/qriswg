<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor QRIS</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .store { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; }
    textarea { width: 100%; height: 150px; font-family: monospace; }
    button { padding: 6px 12px; cursor: pointer; margin-right: 5px; }
    #loading { padding: 20px; background: #f0f0f0; }
    #error { padding: 20px; background: #fee; color: red; display: none; }
  </style>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('qrlogin')) location.href = 'login.html';
  </script>
  
  <h2>Editor QRIS</h2>
  
  <div id="loading">⏳ Memuat data...</div>
  <div id="error"></div>
  <div id="container"></div>

  <script>
    const cfg = JSON.parse(localStorage.adminConfig || '{}');
    
    if (!cfg.token || !cfg.rawUrl) {
      document.body.innerHTML = '<p>⚠️ Isi setup di Dashboard dulu</p>';
    }

    let stores = {};

    fetch(cfg.rawUrl + '?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        stores = data.stores;
        document.getElementById('loading').style.display = 'none';
        renderEditor();
      })
      .catch(err => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').innerHTML = '❌ ' + err.message;
      });

    function renderEditor() {
      const container = document.getElementById('container');
      container.innerHTML = '';
      Object.entries(stores).forEach(([key, store]) => {
        const div = document.createElement('div');
        div.className = 'store';
        div.innerHTML = `<h3>${store.name} (${key})</h3>`;
        store.script_options.forEach((opt, i) => {
          div.innerHTML += `
            <div style="margin:10px 0;">
              <input value="${opt.name}" data-key="${key}" data-idx="${i}" class="oname">
              <textarea data-key="${key}" data-idx="${i}" class="ocode">${opt.code || ''}</textarea>
              <button onclick="deleteOpt('${key}',${i})">🗑</button>
            </div>`;
        });
        div.innerHTML += `
          <button onclick="addOpt('${key}')">➕ Tambah</button>
          <button onclick="save('${key}')">💾 Simpan</button>
          <span id="st-${key}"></span>`;
        container.appendChild(div);
      });
    }

    window.addOpt = function(key) {
      stores[key].script_options.push({ name: 'Baru', code: '' });
      renderEditor();
    };

    window.deleteOpt = function(key, idx) {
      if (stores[key].script_options.length <= 1) return alert('Minimal 1');
      stores[key].script_options.splice(idx, 1);
      if (stores[key].active_index >= stores[key].script_options.length)
        stores[key].active_index = stores[key].script_options.length - 1;
      renderEditor();
    };

    window.save = async function(key) {
      const st = document.getElementById('st-'+key);
      st.textContent = '⏳';
      
      try {
        const store = stores[key];
        document.querySelectorAll(`.oname[data-key="${key}"]`).forEach((inp,i) => {
          if (store.script_options[i]) store.script_options[i].name = inp.value;
        });
        document.querySelectorAll(`.ocode[data-key="${key}"]`).forEach((ta,i) => {
          if (store.script_options[i]) store.script_options[i].code = ta.value;
        });

        const gistUrl = `https://api.github.com/gists/${cfg.gistId}`;
        const gistRes = await fetch(gistUrl, {
          headers: { 'Authorization': `token ${cfg.token}` }
        });
        const gistData = await gistRes.json();
        const config = JSON.parse(gistData.files['config.json'].content);
        let logs = [];
        try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e) {}

        config.stores[key] = JSON.parse(JSON.stringify(store));
        logs.push({ timestamp: new Date().toISOString(), store: key, action: 'Edit' });

        const updateRes = await fetch(gistUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${cfg.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            files: {
              'config.json': { content: JSON.stringify(config, null, 2) },
              'log.json': { content: JSON.stringify(logs, null, 2) }
            }
          })
        });

        if (!updateRes.ok) throw new Error('Gagal');
        stores = config.stores;
        renderEditor();
        st.textContent = '✅';
      } catch(e) {
        st.textContent = '❌';
        alert(e.message);
      }
    };

    window.logout = function() {
      sessionStorage.removeItem('qrlogin');
      location.href = 'login.html';
    };
  </script>
</body>
</html>
