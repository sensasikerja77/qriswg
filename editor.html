<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor QRIS</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f5f5f5; margin: 0; }
    h2 { color: #333; }
    .store { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .store h3 { margin-top: 0; color: #1e293b; border-bottom: 2px solid #e94560; padding-bottom: 8px; }
    .opt-item { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 12px; margin: 10px 0; }
    .opt-item input { width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    textarea { width: 100%; height: 150px; font-family: 'Courier New', monospace; font-size: 13px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical; }
    button { padding: 8px 14px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-size: 13px; margin-right: 5px; }
    .btn-add { background: #3b82f6; color: white; }
    .btn-add:hover { background: #2563eb; }
    .btn-save { background: #10b981; color: white; }
    .btn-save:hover { background: #059669; }
    .btn-del { background: #ef4444; color: white; }
    .btn-del:hover { background: #dc2626; }
    .btn-logout { background: #e94560; color: white; padding: 8px 16px; float: right; }
    .btn-logout:hover { background: #c73650; }
    .toolbar { margin-bottom: 15px; overflow: hidden; }
    .toolbar a { margin-left: 10px; text-decoration: none; color: #1e293b; font-weight: bold; }
    .toolbar a:hover { color: #e94560; }
    .status { font-size: 13px; margin-left: 8px; }
  </style>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('qrlogin')) location.href = 'login.html';
  </script>

  <div class="toolbar">
    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    <h2 style="display:inline-block;">✏️ Editor QRIS</h2>
    <a href="index.html">📊 Dashboard</a>
  </div>

  <div id="content">⏳ Memuat data dari Gist...</div>

  <script>
    const cfg = JSON.parse(localStorage.adminConfig || '{}');
    let currentStores = {}; // State global untuk menyimpan data terkini

    if (!cfg.rawUrl || !cfg.gistId || !cfg.token) {
      document.getElementById('content').innerHTML = '<p style="color:red;">⚠️ Konfigurasi belum lengkap. Silakan setup di <a href="index.html">Dashboard</a> terlebih dahulu.</p>';
    } else {
      loadFromGist();
    }

    // Menggunakan API GitHub agar tidak terkena cache CDN
    async function loadFromGist() {
      document.getElementById('content').innerHTML = '⏳ Memuat...';
      try {
        const gistUrl = `https://api.github.com/gists/${cfg.gistId}`;
        const res = await fetch(gistUrl, {
          headers: { 'Authorization': `token ${cfg.token}` }
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const gistData = await res.json();
        if (!gistData.files['config.json']) throw new Error('File config.json tidak ditemukan');
        const data = JSON.parse(gistData.files['config.json'].content);
        if (!data.stores) throw new Error('Tidak ada data stores');
        
        currentStores = data.stores;
        renderEditor(currentStores);
      } catch(e) {
        document.getElementById('content').innerHTML = `<p style="color:red;">❌ ${e.message} <button class="btn-save" onclick="loadFromGist()">Coba Lagi</button></p>`;
      }
    }

    function escapeHtml(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderEditor(stores) {
      let html = '';
      Object.entries(stores).forEach(([key, store]) => {
        html += `<div class="store"><h3>${escapeHtml(store.name)} <small style="color:#888;">(${escapeHtml(key)})</small></h3>`;
        store.script_options.forEach((opt, i) => {
          html += `
            <div class="opt-item">
              <input value="${escapeHtml(opt.name)}" id="oname-${key}-${i}" placeholder="Nama Script">
              <textarea id="ocode-${key}-${i}" placeholder="Kode JavaScript...">${escapeHtml(opt.code || '')}</textarea>
              <button class="btn-del" onclick="deleteOpt('${key}',${i})">🗑 Hapus</button>
            </div>`;
        });
        html += `
          <button class="btn-add" onclick="addOpt('${key}')">➕ Tambah Script</button>
          <button class="btn-save" onclick="saveStore('${key}')">💾 Simpan</button>
          <span class="status" id="st-${key}"></span>
        </div>`;
      });
      document.getElementById('content').innerHTML = html;
    }

    // Modifikasi langsung currentStores (tidak fetch ulang)
    window.addOpt = function(key) {
      currentStores[key].script_options.push({ name: 'Script Baru', code: '' });
      renderEditor(currentStores);
    };

    window.deleteOpt = function(key, idx) {
      if (currentStores[key].script_options.length <= 1) {
        alert('Minimal harus ada 1 script!');
        return;
      }
      if (!confirm('Yakin hapus script "' + currentStores[key].script_options[idx].name + '"?')) return;
      currentStores[key].script_options.splice(idx, 1);
      if (currentStores[key].active_index >= currentStores[key].script_options.length) {
        currentStores[key].active_index = currentStores[key].script_options.length - 1;
      }
      renderEditor(currentStores);
    };

    // Menggunakan currentStores agar add/delete tidak hilang saat simpan
    window.saveStore = async function(key) {
      const st = document.getElementById('st-' + key);
      st.textContent = ' ⏳ Menyimpan...';
      
      try {
        // 1. Ambil nilai dari form ke currentStores
        currentStores[key].script_options.forEach((opt, i) => {
          const nameEl = document.getElementById(`oname-${key}-${i}`);
          const codeEl = document.getElementById(`ocode-${key}-${i}`);
          if (nameEl) opt.name = nameEl.value;
          if (codeEl) opt.code = codeEl.value;
        });

        const gistUrl = `https://api.github.com/gists/${cfg.gistId}`;
        
        // 2. Fetch data Gist terbaru (untuk log.json)
        const gistRes = await fetch(gistUrl, {
          headers: { 'Authorization': `token ${cfg.token}` }
        });
        if (!gistRes.ok) throw new Error('HTTP ' + gistRes.status);
        const gistData = await gistRes.json();
        
        // 3. Timpa stores di config dengan currentStores
        const config = JSON.parse(gistData.files['config.json'].content);
        config.stores = currentStores; 

        // 4. Ambil log.json dengan aman
        let logs = [];
        if (gistData.files['log.json']) {
          try { logs = JSON.parse(gistData.files['log.json'].content || '[]'); } catch(e) { logs = []; }
        }
        logs.push({ 
          timestamp: new Date().toISOString(), 
          store: key, 
          action: 'Edit script' 
        });

        // 5. Patch ke GitHub
        const updateRes = await fetch(gistUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${cfg.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            files: {
              'config.json': { content: JSON.stringify(config, null, 2) },
              'log.json': { content: JSON.stringify(logs, null, 2) }
            }
          })
        });

        if (!updateRes.ok) throw new Error('HTTP ' + updateRes.status);
        st.textContent = ' ✅ Tersimpan';
        setTimeout(() => { if (document.getElementById('st-' + key)) document.getElementById('st-' + key).textContent = ''; }, 3000);
      } catch(e) {
        st.textContent = ' ❌ ' + e.message;
        alert('Error: ' + e.message);
      }
    };

    window.logout = function() {
      sessionStorage.removeItem('qrlogin');
      location.href = 'login.html';
    };
  </script>
</body>
</html>
