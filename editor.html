<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Script - QRIS Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; color: #2d3436; }
    .header { background: #16213e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .header h2 { color: #e94560; }
    .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
    .config-bar { background: white; padding: 15px 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .config-bar input { margin: 5px 5px 5px 0; padding: 8px; width: 220px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    .config-bar button { padding: 8px 16px; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 4px; font-weight: bold; }
    .store-block { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .store-block h3 { margin-bottom: 15px; color: #16213e; }
    .script-group { margin-bottom: 15px; padding: 12px; background: #f9f9f9; border-radius: 6px; }
    .script-group label { display: block; font-weight: 500; margin-bottom: 5px; }
    textarea { width: 100%; height: 200px; font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; border: 1px solid #ddd; border-radius: 4px; padding: 10px; resize: vertical; }
    input.opt-name { font-weight: bold; padding: 6px 10px; width: 250px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; }
    .actions { margin-top: 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .actions button { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
    .save-btn { background: #00b894; color: white; }
    .save-btn:hover { background: #00a381; }
    .add-btn { background: #0984e3; color: white; }
    .add-btn:hover { background: #0767b3; }
    .del-btn { background: #e94560; color: white; font-size: 12px; padding: 4px 10px; }
    .del-btn:hover { background: #c23152; }
    .status { font-size: 0.9em; color: #00b894; }
    .logout-btn { background: #e94560; color: white; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .logout-btn:hover { background: #c23152; }
    .nav { margin-bottom: 15px; }
    .nav a { color: #16213e; text-decoration: none; margin-right: 20px; font-weight: 500; }
    .nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('qrlogin')) { window.location.href = 'login.html'; }
  </script>

  <div class="header">
    <h2>✏️ Editor Script QRIS</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <div class="nav">
      <a href="index.html">🏠 Dashboard</a>
      <a href="editor.html">✏️ Editor Script</a>
    </div>

    <div class="config-bar">
      <strong>⚙️ Pengaturan</strong><br>
      Token: <input type="password" id="tokenInput"><br>
      Gist ID: <input type="text" id="gistIdInput"><br>
      Raw URL: <input type="text" id="rawUrlInput"><br>
      <button onclick="saveConfig()">Simpan & Muat</button>
    </div>

    <div id="container"></div>
  </div>

  <script>
    let CONFIG = {};
    if(localStorage.adminConfig) CONFIG = JSON.parse(localStorage.adminConfig);
    if(CONFIG.token) document.getElementById('tokenInput').value = CONFIG.token;
    if(CONFIG.gistId) document.getElementById('gistIdInput').value = CONFIG.gistId;
    if(CONFIG.rawUrl) document.getElementById('rawUrlInput').value = CONFIG.rawUrl;
    if(CONFIG.rawUrl) loadData();

    async function saveConfig() {
      CONFIG.token = document.getElementById('tokenInput').value.trim();
      CONFIG.gistId = document.getElementById('gistIdInput').value.trim();
      CONFIG.rawUrl = document.getElementById('rawUrlInput').value.trim();
      localStorage.adminConfig = JSON.stringify(CONFIG);
      await loadData();
    }

    let data = {};
    async function loadData() {
      try {
        const res = await fetch(CONFIG.rawUrl);
        data = await res.json();
        renderEditor();
      } catch(e) { alert('Gagal load data.'); }
    }

    function renderEditor() {
      const container = document.getElementById('container');
      container.innerHTML = '';
      Object.entries(data.stores).forEach(([key, store]) => {
        const div = document.createElement('div');
        div.className = 'store-block';
        div.id = `block-${key}`;
        div.innerHTML = `<h3>🏪 ${store.name} <small style="color:#888;">(${key})</small></h3>`;
        store.script_options.forEach((opt, i) => {
          div.innerHTML += `
            <div class="script-group" id="opt-${key}-${i}">
              <label>Opsi ${i+1}:</label>
              <input type="text" class="opt-name" data-key="${key}" data-idx="${i}" value="${opt.name}">
              <textarea data-key="${key}" data-idx="${i}">${opt.code || ''}</textarea>
              <button class="del-btn" onclick="deleteOption('${key}', ${i})">🗑 Hapus Opsi</button>
            </div>`;
        });
        div.innerHTML += `
          <div class="actions">
            <button class="add-btn" onclick="addOption('${key}')">➕ Tambah Opsi</button>
            <button class="save-btn" onclick="saveStore('${key}')">💾 Simpan Perubahan Script</button>
            <span class="status" id="status-${key}"></span>
          </div>`;
        container.appendChild(div);
      });
    }

    function addOption(key) {
      const store = data.stores[key];
      store.script_options.push({ name: 'Opsi Baru', code: '' });
      renderEditor();
    }

    function deleteOption(key, idx) {
      const store = data.stores[key];
      if (store.script_options.length <= 1) {
        alert('Minimal harus ada 1 opsi script.');
        return;
      }
      store.script_options.splice(idx, 1);
      if (store.active_index >= store.script_options.length) {
        store.active_index = store.script_options.length - 1;
      }
      renderEditor();
    }

    async function saveStore(key) {
      const store = data.stores[key];
      document.querySelectorAll(`.opt-name[data-key="${key}"]`).forEach((inp, i) => {
        if (store.script_options[i]) store.script_options[i].name = inp.value;
      });
      document.querySelectorAll(`textarea[data-key="${key}"]`).forEach((ta, i) => {
        if (store.script_options[i]) store.script_options[i].code = ta.value;
      });

      const status = document.getElementById(`status-${key}`);
      status.textContent = '⏳ Menyimpan...';

      const logEntry = {
        timestamp: new Date().toISOString(),
        store: key,
        action: `Edit kode script`,
        user_agent: navigator.userAgent
      };

      try {
        const gistUrl = `https://api.github.com/gists/${CONFIG.gistId}`;
        const gistRes = await fetch(gistUrl, { headers: { 'Authorization': `token ${CONFIG.token}` } });
        const gistData = await gistRes.json();
        let logs = [];
        try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e){}
        logs.push(logEntry);

        const updateRes = await fetch(gistUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${CONFIG.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            files: {
              'config.json': { content: JSON.stringify(data, null, 2) },
              'log.json': { content: JSON.stringify(logs, null, 2) }
            }
          })
        });
        status.textContent = updateRes.ok ? '✅ Tersimpan' : '❌ Gagal';
      } catch(e) { status.textContent = '❌ Error'; }
    }

    function logout() {
      sessionStorage.removeItem('qrlogin');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
