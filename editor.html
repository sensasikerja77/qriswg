<script>
    if (!sessionStorage.getItem('qrlogin')) window.location.href = 'login.html';

    let CONFIG = JSON.parse(localStorage.adminConfig || '{}');
    if (!CONFIG.token || !CONFIG.rawUrl) {
      document.body.innerHTML = '<div style="padding:40px;">⚠️ Silakan isi konfigurasi di <a href="index.html">Dashboard</a> terlebih dahulu.</div>';
    } else {
      loadData();
    }

    let data = {};
    async function loadData() {
      try {
        const res = await fetch(CONFIG.rawUrl + '?t=' + Date.now());
        data = await res.json();
        renderEditor();
      } catch(e) { showToast('❌ Gagal memuat'); }
    }

    function renderEditor() {
      const container = document.getElementById('editorContainer');
      container.innerHTML = '';
      Object.entries(data.stores).forEach(([key, store]) => {
        const div = document.createElement('div');
        div.className = 'store-block';
        div.innerHTML = `<h3>🏪 ${store.name} <small style="color:#64748b;">(${key})</small></h3>`;
        store.script_options.forEach((opt, i) => {
          div.innerHTML += `
            <div style="margin-top:16px;">
              <input class="opt-name-input" value="${opt.name}" data-key="${key}" data-idx="${i}">
              <textarea data-key="${key}" data-idx="${i}">${opt.code || ''}</textarea>
              <button class="btn btn-delete" onclick="deleteOption('${key}',${i})">🗑 Hapus</button>
            </div>`;
        });
        div.innerHTML += `
          <div style="margin-top:16px;">
            <button class="btn btn-add" onclick="addOption('${key}')">➕ Tambah Opsi</button>
            <button class="btn btn-save" onclick="saveStore('${key}')">💾 Simpan</button>
            <span id="status-${key}" style="margin-left:12px;"></span>
          </div>`;
        container.appendChild(div);
      });
    }

    function addOption(key) {
      data.stores[key].script_options.push({ name: 'Opsi Baru', code: '' });
      renderEditor();
    }

    function deleteOption(key, idx) {
      if (data.stores[key].script_options.length <= 1) return alert('Minimal 1 opsi.');
      data.stores[key].script_options.splice(idx, 1);
      if (data.stores[key].active_index >= data.stores[key].script_options.length)
        data.stores[key].active_index = data.stores[key].script_options.length - 1;
      renderEditor();
    }

    async function saveStore(key) {
      if (!confirm('Simpan perubahan script untuk ' + key + '?')) return;
      const st = document.getElementById('status-'+key);
      st.textContent = '⏳';

      try {
        // Ambil gist terbaru
        const gistUrl = `https://api.github.com/gists/${CONFIG.gistId}`;
        const gistRes = await fetch(gistUrl, {
          headers: { 'Authorization': `token ${CONFIG.token}` }
        });
        if (!gistRes.ok) throw new Error('Gagal ambil gist');
        const gistData = await gistRes.json();

        const latestConfig = JSON.parse(gistData.files['config.json'].content);
        let logs = [];
        try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e){}

        // Update config terbaru dari input
        const store = latestConfig.stores[key];
        if (!store) throw new Error('Toko tidak ditemukan');
        document.querySelectorAll(`.opt-name-input[data-key="${key}"]`).forEach((inp,i) => {
          if (store.script_options[i]) store.script_options[i].name = inp.value;
        });
        document.querySelectorAll(`textarea[data-key="${key}"]`).forEach((ta,i) => {
          if (store.script_options[i]) store.script_options[i].code = ta.value;
        });

        logs.push({
          timestamp: new Date().toISOString(),
          store: key,
          action: 'Edit kode script',
          user_agent: navigator.userAgent
        });

        const updateRes = await fetch(gistUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${CONFIG.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            files: {
              'config.json': { content: JSON.stringify(latestConfig, null, 2) },
              'log.json': { content: JSON.stringify(logs, null, 2) }
            }
          })
        });

        if (!updateRes.ok) throw new Error('Gagal menyimpan');
        st.textContent = '✅';
        showToast('✅ Tersimpan');
        await loadData();
      } catch(e) {
        st.textContent = '❌';
        showToast('❌ Error: ' + e.message);
      }
      setTimeout(() => st.textContent = '', 2000);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function logout() {
      sessionStorage.removeItem('qrlogin');
      window.location.href = 'login.html';
    }
</script>
