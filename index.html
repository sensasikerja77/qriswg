<script>
    if (!sessionStorage.getItem('qrlogin')) window.location.href = 'login.html';

    let CONFIG = {};
    if (localStorage.adminConfig) {
      CONFIG = JSON.parse(localStorage.adminConfig);
      if (CONFIG.token && CONFIG.gistId && CONFIG.rawUrl) {
        document.getElementById('setupPanel').style.display = 'none';
        loadData();
      } else {
        document.getElementById('setupPanel').style.display = 'block';
        if (CONFIG.token) document.getElementById('tokenInput').value = CONFIG.token;
        if (CONFIG.gistId) document.getElementById('gistIdInput').value = CONFIG.gistId;
        if (CONFIG.rawUrl) document.getElementById('rawUrlInput').value = CONFIG.rawUrl;
      }
    } else {
      document.getElementById('setupPanel').style.display = 'block';
    }

    async function saveSetup() {
      CONFIG.token = document.getElementById('tokenInput').value.trim();
      CONFIG.gistId = document.getElementById('gistIdInput').value.trim();
      CONFIG.rawUrl = document.getElementById('rawUrlInput').value.trim();
      localStorage.adminConfig = JSON.stringify(CONFIG);
      document.getElementById('setupPanel').style.display = 'none';
      await loadData();
    }

    let data = {};
    async function loadData() {
      try {
        // Ambil data terbaru dari Gist (dengan timestamp anti-cache)
        const res = await fetch(CONFIG.rawUrl + '?t=' + Date.now());
        data = await res.json();
        renderTable();
      } catch(e) {
        showToast('❌ Gagal memuat data');
      }
    }

    function renderTable() {
      const tbody = document.getElementById('storeBody');
      tbody.innerHTML = '';
      Object.entries(data.stores).forEach(([key, store]) => {
        const active = store.script_options[store.active_index];
        const row = tbody.insertRow();
        row.innerHTML = `
          <td><strong>${store.name}</strong></td>
          <td>${active ? active.name : '—'}</td>
          <td>
            <select id="sel-${key}">
              ${store.script_options.map((opt,i) => `<option value="${i}" ${i===store.active_index?'selected':''}>${opt.name}</option>`).join('')}
            </select>
          </td>
          <td>
            <button class="btn-primary" onclick="updateActive('${key}')">Simpan</button>
            <span class="status-badge" id="st-${key}"></span>
          </td>
        `;
      });
    }

    async function updateActive(key) {
      if (!confirm('Yakin ubah script aktif untuk ' + key + '?')) return;

      const sel = document.getElementById('sel-'+key);
      const newIdx = parseInt(sel.value);
      const st = document.getElementById('st-'+key);
      st.textContent = '⏳';
      st.classList.add('show');

      try {
        // 1. Ambil data TERBARU dari Gist (menghindari konflik)
        const gistUrl = `https://api.github.com/gists/${CONFIG.gistId}`;
        const gistRes = await fetch(gistUrl, {
          headers: { 'Authorization': `token ${CONFIG.token}` }
        });
        if (!gistRes.ok) throw new Error('Gagal ambil gist');
        const gistData = await gistRes.json();

        // 2. Parse config & log terbaru
        const latestConfig = JSON.parse(gistData.files['config.json'].content);
        let logs = [];
        try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e){}

        // 3. Ubah active_index di config terbaru
        const store = latestConfig.stores[key];
        if (!store) throw new Error('Toko tidak ditemukan');
        const oldName = store.script_options[store.active_index].name;
        const newName = store.script_options[newIdx].name;
        store.active_index = newIdx;

        // 4. Tambah log
        logs.push({
          timestamp: new Date().toISOString(),
          store: key,
          action: `Ubah script: ${oldName} → ${newName}`,
          user_agent: navigator.userAgent
        });

        // 5. SIMPAN ke Gist (config + log)
        const updateRes = await fetch(gistUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${CONFIG.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            files: {
              'config.json': { content: JSON.stringify(latestConfig, null, 2) },
              'log.json': { content: JSON.stringify(logs, null, 2) }
            }
          })
        });

        if (!updateRes.ok) throw new Error('Gagal menyimpan');

        // 6. Jika berhasil, muat ulang data dari Gist agar UI sinkron
        st.textContent = '✅';
        showToast('✅ Berhasil diperbarui');
        await loadData(); // <-- Ini kunci: ambil lagi dari Gist, bukan optimistik lokal
      } catch(e) {
        st.textContent = '❌';
        showToast('❌ Gagal: ' + e.message);
      }
      setTimeout(() => {
        st.classList.remove('show');
        st.textContent = '';
      }, 2000);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function logout() {
      sessionStorage.removeItem('qrlogin');
      window.location.href = 'login.html';
    }
</script>
