<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard QRIS</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 10px; }
    button { padding: 8px 16px; cursor: pointer; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>Dashboard QRIS</h2>
  <div id="setup" style="display:none; margin-bottom:20px;">
    <input type="password" id="tokenInput" placeholder="Token">
    <input type="text" id="gistIdInput" placeholder="Gist ID">
    <input type="text" id="rawUrlInput" placeholder="Raw URL" style="width:300px;">
    <button onclick="saveSetup()">Simpan Setup</button>
  </div>
  <table><thead><tr><th>Toko</th><th>Aktif</th><th>Ubah</th><th>Aksi</th></tr></thead><tbody id="tbody"></tbody></table>
  <div class="toast" id="toast" style="display:none;"></div>

  <script>
    if (!sessionStorage.getItem('qrlogin')) location.href = 'login.html';

    let CONFIG = JSON.parse(localStorage.adminConfig || '{}');
    if (CONFIG.token && CONFIG.gistId && CONFIG.rawUrl) {
      document.getElementById('setup').style.display = 'none';
      loadData();
    } else {
      document.getElementById('setup').style.display = 'block';
      document.getElementById('tokenInput').value = CONFIG.token || '';
      document.getElementById('gistIdInput').value = CONFIG.gistId || '';
      document.getElementById('rawUrlInput').value = CONFIG.rawUrl || '';
    }

    window.saveSetup = function() {
      CONFIG.token = document.getElementById('tokenInput').value.trim();
      CONFIG.gistId = document.getElementById('gistIdInput').value.trim();
      CONFIG.rawUrl = document.getElementById('rawUrlInput').value.trim();
      localStorage.adminConfig = JSON.stringify(CONFIG);
      document.getElementById('setup').style.display = 'none';
      loadData();
    };

    let storeData = {};

    async function loadData() {
      document.getElementById('tbody').innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
      try {
        const res = await fetch(CONFIG.rawUrl + '?t=' + Date.now());
        const json = await res.json();
        storeData = json.stores;
        renderTable();
      } catch(e) {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="4">❌ Gagal load: ' + e.message + '</td></tr>';
      }
    }

    function renderTable() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      Object.entries(storeData).forEach(([key, store]) => {
        const active = store.script_options[store.active_index];
        tbody.innerHTML += `
          <tr>
            <td>${store.name}</td>
            <td>${active ? active.name : '—'}</td>
            <td>
              <select id="sel-${key}">
                ${store.script_options.map((o,i) => `<option value="${i}" ${i===store.active_index?'selected':''}>${o.name}</option>`).join('')}
              </select>
            </td>
            <td><button onclick="update('${key}')">Simpan</button> <span id="st-${key}"></span></td>
          </tr>`;
      });
    }

    window.update = async function(key) {
      const newIdx = parseInt(document.getElementById('sel-'+key).value);
      const st = document.getElementById('st-'+key);
      st.textContent = '⏳';

      try {
        // Ambil gist terbaru
        const gistUrl = `https://api.github.com/gists/${CONFIG.gistId}`;
        const gistRes = await fetch(gistUrl, {
          headers: { 'Authorization': `token ${CONFIG.token}` }
        });
        if (!gistRes.ok) throw new Error('Gagal ambil gist: ' + gistRes.status);
        const gistData = await gistRes.json();

        // Parse
        const config = JSON.parse(gistData.files['config.json'].content);
        let logs = [];
        try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e) {}

        // Ubah
        const store = config.stores[key];
        if (!store) throw new Error('Toko tidak ditemukan');
        store.active_index = newIdx;

        // Log
        logs.push({
          timestamp: new Date().toISOString(),
          store: key,
          action: 'Ubah active_index ke ' + newIdx
        });

        // Simpan
        const updateRes = await fetch(gistUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${CONFIG.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            files: {
              'config.json': { content: JSON.stringify(config, null, 2) },
              'log.json': { content: JSON.stringify(logs, null, 2) }
            }
          })
        });

        if (!updateRes.ok) {
          const err = await updateRes.text();
          throw new Error('Gagal simpan: ' + err);
        }

        // Sukses — muat ulang
        st.textContent = '✅';
        showToast('Berhasil');
        await loadData();
      } catch(e) {
        st.textContent = '❌';
        showToast('Gagal: ' + e.message);
        alert('Gagal: ' + e.message);
      }
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2000);
    }

    window.logout = function() {
      sessionStorage.removeItem('qrlogin');
      location.href = 'login.html';
    };
  </script>
</body>
</html>
