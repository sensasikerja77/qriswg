<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard QRIS</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; margin: 0; }
    table { border-collapse: collapse; width: 100%; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    th { background: #1e293b; color: white; padding: 12px; text-align: left; }
    td { border-bottom: 1px solid #eee; padding: 10px; }
    button { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; background: #10b981; color: white; font-weight: bold; }
    .setup { background: white; padding: 20px; margin-bottom: 20px; display: none; }
    .setup input { margin-right: 8px; padding: 8px; }
    .btn-logout { background: #e94560; float: right; }
    .toolbar { margin-bottom: 15px; overflow: hidden; }
    .toolbar a { margin-left: 10px; text-decoration: none; color: #1e293b; font-weight: bold; }
    select { padding: 6px; }
  </style>
</head>
<body>
  <script>if (!sessionStorage.getItem('qrlogin')) location.href = 'login.html';</script>

  <div class="toolbar">
    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    <h2 style="display:inline-block;">📊 Dashboard QRIS</h2>
    <a href="editor.html">✏️ Editor</a>
  </div>

  <div class="setup" id="setupPanel">
    <h3>⚙️ Setup</h3>
    <input type="password" id="tokenInput" placeholder="Token">
    <input type="text" id="gistIdInput" placeholder="Gist ID">
    <button onclick="saveSetup()">Simpan</button>
  </div>

  <div id="app">⏳ Memuat...</div>

  <script>
    var cfg = JSON.parse(localStorage.adminConfig || '{}');
    if (cfg.token && cfg.gistId) {
      document.getElementById('setupPanel').style.display = 'none';
      load();
    } else {
      document.getElementById('setupPanel').style.display = 'block';
      if (cfg.token) document.getElementById('tokenInput').value = cfg.token;
      if (cfg.gistId) document.getElementById('gistIdInput').value = cfg.gistId;
    }

    window.saveSetup = function() {
      cfg.token = document.getElementById('tokenInput').value.trim();
      cfg.gistId = document.getElementById('gistIdInput').value.trim();
      localStorage.adminConfig = JSON.stringify(cfg);
      document.getElementById('setupPanel').style.display = 'none';
      load();
    };

    var stores = {};

    function load() {
      document.getElementById('app').innerHTML = '⏳ Memuat...';
      fetch(`https://api.github.com/gists/${cfg.gistId}`, { headers: { 'Authorization': 'token ' + cfg.token } })
        .then(r => r.json())
        .then(gistData => {
          const data = JSON.parse(gistData.files['config.json'].content);
          stores = data.stores;
          render();
        })
        .catch(e => { document.getElementById('app').innerHTML = '❌ ' + e.message; });
    }

    function render() {
      var html = '<table><tr><th>Toko</th><th>Aktif</th><th>Ubah</th><th>Aksi</th></tr>';
      Object.keys(stores).forEach(key => {
        var s = stores[key];
        var a = s.script_options[s.active_index];
        html += '<tr><td><b>' + s.name + '</b></td><td>' + (a ? a.name : '—') + '</td>';
        html += '<td><select id="sel_' + key + '">';
        s.script_options.forEach((o, i) => html += '<option value="' + i + '" ' + (i === s.active_index ? 'selected' : '') + '>' + o.name + '</option>');
        html += '</select></td>';
        html += '<td><button onclick="simpan(\'' + key + '\')">Simpan</button> <span id="st_' + key + '"></span></td></tr>';
      });
      html += '</table>';
      document.getElementById('app').innerHTML = html;
    }

    window.simpan = async function(key) {
      var newIdx = document.getElementById('sel_' + key).value;
      var st = document.getElementById('st_' + key);
      st.textContent = '⏳';
      try {
        var gistRes = await fetch('https://api.github.com/gists/' + cfg.gistId, { headers: { 'Authorization': 'token ' + cfg.token } });
        var gistData = await gistRes.json();
        var config = JSON.parse(gistData.files['config.json'].content);
        var logs = [];
        if (gistData.files['log.json']) {
          try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e) {}
        }
        config.stores[key].active_index = parseInt(newIdx);
        logs.push({ timestamp: new Date().toISOString(), store: key, action: 'Ubah ke ' + config.stores[key].script_options[newIdx].name });
        var updateRes = await fetch('https://api.github.com/gists/' + cfg.gistId, {
          method: 'PATCH',
          headers: { 'Authorization': 'token ' + cfg.token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ files: { 'config.json': { content: JSON.stringify(config, null, 2) }, 'log.json': { content: JSON.stringify(logs, null, 2) } } })
        });
        if (!updateRes.ok) throw new Error('Gagal');
        stores = config.stores;
        render();
        st.textContent = '✅';
      } catch(e) { st.textContent = '❌'; alert(e.message); }
    };

    window.logout = function() {
      sessionStorage.removeItem('qrlogin');
      location.href = 'login.html';
    };
  </script>
</body>
</html>
