<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard QRIS Auto</title>
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f5f5f5; margin: 0; }
    h2 { color: #333; margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
    th { background: #1e293b; color: white; padding: 12px 8px; text-align: left; font-size: 14px; }
    td { border-bottom: 1px solid #eee; padding: 10px 8px; font-size: 14px; vertical-align: top; }
    tr:hover { background: #fafafa; }
    button { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: background 0.2s; }
    .btn-save { background: #10b981; color: white; }
    .btn-save:hover { background: #059669; }
    .btn-save:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-logout { background: #e94560; color: white; float: right; }
    .toolbar { margin-bottom: 15px; overflow: hidden; }
    .toolbar a { margin-left: 10px; text-decoration: none; color: #1e293b; font-weight: bold; }
    
    select { padding: 6px; border-radius: 4px; border: 1px solid #ccc; width: 100%; margin-bottom: 5px; }
    
    /* Toggle Switch Style */
    .toggle-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .toggle-switch { position: relative; width: 60px; height: 30px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 30px; }
    .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #10b981; }
    input:checked + .slider:before { transform: translateX(30px); }
    .toggle-label { font-weight: bold; font-size: 14px; }
    .toggle-status { font-size: 12px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    .status-on { background: #d1fae5; color: #065f46; }
    .status-off { background: #fee2e2; color: #991b1b; }
    
    .status-dot { height: 8px; width: 8px; background-color: #10b981; border-radius: 50%; display: inline-block; margin-right: 5px; }
  </style>
</head>
<body>
  <script>if (!sessionStorage.getItem('qrlogin')) location.href = 'login.html';</script>

  <div class="toolbar">
    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    <h2 style="display:inline-block;">📊 Dashboard Konfigurasi QRIS</h2>
    <a href="editor.html">✏️ Editor Script</a>
  </div>

  <!-- Panel Auto-Rotate -->
  <div class="toggle-container" id="rotatePanel">
    <span class="toggle-label">Auto-Rotate Global:</span>
    <label class="toggle-switch">
      <input type="checkbox" id="autoRotateToggle" onchange="toggleAutoRotate()">
      <span class="slider"></span>
    </label>
    <span id="toggleStatus" class="toggle-status status-on">AKTIF</span>
  </div>

  <div id="app">⏳ Memuat data dari Supabase...</div>

  <script>
    // 🌟 INJEKSI KREDENSIAL SUPABASE DI SINI 🌟
    // Ganti URL dan Anon Key di bawah ini dengan milik Anda dari menu Settings > API di Supabase
    const SUPABASE_URL = 'https://tktvwdejrcrsyzilizpm.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrdHZ3ZGVqcmNyc3l6aWxpenBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NTQzMzAsImV4cCI6MjA5OTUzMDMzMH0.Ml9Iu7OsaVezLikiDX2SdMF3nRtttVU5F9brcOFnAL0';            

    let supabaseClient = null;
    let stores = {};
    let autoRotateEnabled = true;

    // Langsung inisialisasi saat halaman dibuka
    initSupabase(SUPABASE_URL, SUPABASE_ANON_KEY);

    function initSupabase(url, key) {
      if (!url || url.includes('YOUR_PROJECT_ID') || !key || key.includes('YOUR_ANON')) {
        document.getElementById('app').innerHTML = '<p style="color:red; text-align:center;">⚠️ ERROR: Silakan edit kode HTML dan masukkan Supabase URL & Anon Key Anda terlebih dahulu.</p>';
        return;
      }

      supabaseClient = window.supabase.createClient(url, key);
      loadAllData();
    }

    // Ambil Data dari Supabase
    async function loadAllData() {
      document.getElementById('app').innerHTML = '⏳ Memuat data konfigurasi...';
      try {
        // Ambil data stores
        const { data: storesData, error: err1 } = await supabaseClient.from('stores').select('*').order('id', { ascending: true });
        if (err1) throw err1;
        
        stores = {};
        storesData.forEach(s => { stores[s.id] = s; });

        // Ambil status auto-rotate
        const { data: configData, error: err2 } = await supabaseClient.from('global_config').select('value').eq('key', 'auto_rotate_enabled').single();
        if (!err2 && configData) {
          autoRotateEnabled = configData.value === 'true';
        }
        
        document.getElementById('autoRotateToggle').checked = autoRotateEnabled;
        updateToggleStatus();
        renderDashboard();
      } catch (e) {
        document.getElementById('app').innerHTML = `<p style="color:red; text-align:center;">❌ Gagal memuat: ${e.message} <br><small>Pastikan URL/Key benar dan RLS sudah di-setup.</small><br><button class="btn-save" onclick="loadAllData()">Coba Lagi</button></p>`;
      }
    }

    function updateToggleStatus() {
      const statusEl = document.getElementById('toggleStatus');
      statusEl.textContent = autoRotateEnabled ? 'AKTIF' : 'NONAKTIF';
      statusEl.className = `toggle-status ${autoRotateEnabled ? 'status-on' : 'status-off'}`;
    }

    // Toggle Auto-Rotate
    window.toggleAutoRotate = async function() {
      const newValue = document.getElementById('autoRotateToggle').checked;
      
      if (!confirm(`Yakin ingin ${newValue ? 'MENGAKTIFKAN' : 'MENONAKTIFKAN'} auto-rotate?`)) {
        document.getElementById('autoRotateToggle').checked = autoRotateEnabled;
        return;
      }

      try {
        const { error } = await supabaseClient
          .from('global_config')
          .upsert({ key: 'auto_rotate_enabled', value: newValue.toString() });
        
        if (error) throw error;
        
        autoRotateEnabled = newValue;
        updateToggleStatus();
        alert(`✅ Auto-rotate berhasil ${newValue ? 'DIAKTIFKAN' : 'DINONAKTIFKAN'}`);
      } catch(e) { 
        alert('❌ Gagal mengubah status: ' + e.message);
        document.getElementById('autoRotateToggle').checked = autoRotateEnabled;
      }
    };

    // Render Tampilan Dashboard
    function renderDashboard() {
      if (Object.keys(stores).length === 0) {
        document.getElementById('app').innerHTML = '<p style="text-align:center; padding: 20px;">Belum ada data toko di database.</p>';
        return;
      }
      
      let html = '<table><tr><th style="width: 15%;">ID Toko</th><th style="width: 25%;">Nama Toko</th><th style="width: 25%;">Script Aktif</th><th style="width: 35%;">Ganti Manual</th></tr>';
      
      Object.keys(stores).forEach(key => {
        const s = stores[key];
        const activeScript = s.script_options[s.active_index];
        
        const optionsHtml = s.script_options.map((o, i) => 
          `<option value="${i}" ${i === s.active_index ? 'selected' : ''}>${o.name}</option>`
        ).join('');

        html += `<tr>
          <td><b>${key}</b></td>
          <td>${s.name}</td>
          <td>
            <span class="status-dot"></span>
            <b>${activeScript ? activeScript.name : 'Tidak ada'}</b>
          </td>
          <td>
            <select id="sel_${key}">
              ${optionsHtml}
            </select>
            <button class="btn-save" id="btn_${key}" onclick="simpan('${key}')" style="width:100%;">💾 Simpan Perubahan</button>
            <span id="st_${key}" style="font-size:12px; margin-left: 5px;"></span>
          </td>
        </tr>`;
      });
      
      html += '</table>';
      html += '<p style="text-align:center; color:#666; font-size:12px; margin-top: 20px;">💡 Perubahan akan langsung disimpan ke database Supabase dan dicatat di log.</p>';
      document.getElementById('app').innerHTML = html;
    }

    // Fungsi Simpan Perubahan ke Supabase
    window.simpan = async function(key) {
      const newIdx = parseInt(document.getElementById('sel_' + key).value);
      const st = document.getElementById('st_' + key);
      const btn = document.getElementById('btn_' + key);
      
      st.textContent = ' ⏳';
      btn.disabled = true; // Mencegah double-click
      
      try {
        const activeName = stores[key].script_options[newIdx].name;

        // A. Update tabel stores
        const { error: err1 } = await supabaseClient
          .from('stores')
          .update({ active_index: newIdx })
          .eq('id', key);
        if (err1) throw err1;

        // B. Catat ke tabel logs
        const { error: err2 } = await supabaseClient
          .from('logs')
          .insert({ 
            store_id: key, 
            action: `Ubah manual script ke: ${activeName}` 
          });
        if (err2) throw err2;

        // C. Update state lokal & re-render
        stores[key].active_index = newIdx;
        renderDashboard();
        
        st.textContent = ' ✅';
        setTimeout(() => { 
          const el = document.getElementById('st_' + key);
          if (el) el.textContent = ''; 
        }, 3000);
      } catch(e) { 
        st.textContent = ' ❌'; 
        alert('Error saat menyimpan: ' + e.message); 
      } finally {
        btn.disabled = false;
      }
    };

    window.logout = function() {
      sessionStorage.removeItem('qrlogin');
      location.href = 'login.html';
    };
  </script>
</body>
</html>
