<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — QRIS Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
    nav { background: #0f172a; color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    nav .brand { font-weight: 700; font-size: 20px; color: #e94560; }
    nav .links a { color: #cbd5e1; text-decoration: none; margin-left: 24px; font-weight: 500; }
    nav .links a.active { color: white; }
    nav button { background: rgba(255,255,255,0.1); border: none; color: #e2e8f0; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }
    .setup-panel { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; margin-bottom: 32px; display: none; }
    .setup-panel input { margin-right: 8px; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; text-align: left; }
    th { color: #64748b; font-weight: 600; font-size: 13px; }
    select, .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; cursor: pointer; }
    .btn-primary { background: #e94560; color: white; border: none; font-weight: 500; }
    .btn-primary:hover { background: #c23152; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #0f172a; color: white; padding: 12px 24px; border-radius: 12px; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('qrlogin')) window.location.href = 'login.html';
  </script>
  <nav>
    <div class="brand">⚡ QRIS Admin</div>
    <div class="links">
      <a href="index.html" class="active">📊 Dashboard</a>
      <a href="editor.html">✏️ Editor</a>
    </div>
    <button onclick="logout()">Logout</button>
  </nav>
  <div class="container">
    <div class="setup-panel" id="setupPanel">
      <h3>⚙️ Konfigurasi Koneksi</h3>
      <input type="password" id="tokenInput" placeholder="Token GitHub (ghp_...)">
      <input type="text" id="gistIdInput" placeholder="Gist ID">
      <input type="text" id="rawUrlInput" placeholder="Raw URL config.json" style="width:300px;">
      <button class="btn-primary" onclick="saveSetup()">Simpan &amp; Muat</button>
    </div>
    <div class="card">
      <h2>📋 Daftar Toko</h2>
      <table>
        <thead><tr><th>Toko</th><th>Script Aktif</th><th>Ubah</th><th>Aksi</th></tr></thead>
        <tbody id="storeBody"></tbody>
      </table>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    (function() {
      let CONFIG = {};
      try { CONFIG = JSON.parse(localStorage.adminConfig || '{}'); } catch(e) {}
      const setupPanel = document.getElementById('setupPanel');
      const tokenInput = document.getElementById('tokenInput');
      const gistIdInput = document.getElementById('gistIdInput');
      const rawUrlInput = document.getElementById('rawUrlInput');
      const storeBody = document.getElementById('storeBody');
      const toastEl = document.getElementById('toast');

      if (CONFIG.token && CONFIG.gistId && CONFIG.rawUrl) {
        setupPanel.style.display = 'none';
        loadFromGist();
      } else {
        setupPanel.style.display = 'block';
        if (CONFIG.token) tokenInput.value = CONFIG.token;
        if (CONFIG.gistId) gistIdInput.value = CONFIG.gistId;
        if (CONFIG.rawUrl) rawUrlInput.value = CONFIG.rawUrl;
      }

      window.saveSetup = async function() {
        CONFIG.token = tokenInput.value.trim();
        CONFIG.gistId = gistIdInput.value.trim();
        CONFIG.rawUrl = rawUrlInput.value.trim();
        localStorage.adminConfig = JSON.stringify(CONFIG);
        setupPanel.style.display = 'none';
        await loadFromGist();
      };

      let data = {};

      async function loadFromGist() {
        try {
          const res = await fetch(CONFIG.rawUrl + '?t=' + Date.now());
          if (!res.ok) throw new Error('Gagal fetch config');
          data = await res.json();
          renderTable();
        } catch(e) {
          showToast('❌ Gagal memuat data dari Gist');
        }
      }

      function renderTable() {
        if (!storeBody) return;
        storeBody.innerHTML = '';
        Object.entries(data.stores).forEach(([key, store]) => {
          const active = store.script_options[store.active_index];
          const row = storeBody.insertRow();
          row.innerHTML = `
            <td><strong>${store.name}</strong></td>
            <td>${active ? active.name : '—'}</td>
            <td>
              <select id="sel-${key}">
                ${store.script_options.map((opt,i) => `<option value="${i}" ${i===store.active_index?'selected':''}>${opt.name}</option>`).join('')}
              </select>
            </td>
            <td>
              <button class="btn-primary" onclick="updateActive('${key}')">Simpan</button>
              <span id="st-${key}" style="margin-left:12px;"></span>
            </td>
          `;
        });
      }

      window.updateActive = async function(key) {
        if (!confirm('Yakin ubah script aktif untuk ' + key + '?')) return;
        const sel = document.getElementById('sel-'+key);
        const newIdx = parseInt(sel.value);
        const st = document.getElementById('st-'+key);
        st.textContent = '⏳';

        try {
          // Ambil gist terbaru
          const gistUrl = `https://api.github.com/gists/${CONFIG.gistId}`;
          let gistRes = await fetch(gistUrl, {
            headers: { 'Authorization': `token ${CONFIG.token}` }
          });
          if (!gistRes.ok) throw new Error('Gagal ambil gist');
          const gistData = await gistRes.json();

          const latestConfig = JSON.parse(gistData.files['config.json'].content);
          let logs = [];
          try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e) {}

          // Ubah active_index
          const store = latestConfig.stores[key];
          if (!store) throw new Error('Toko tidak ditemukan');
          const oldName = store.script_options[store.active_index].name;
          const newName = store.script_options[newIdx].name;
          store.active_index = newIdx;

          // Tambah log
          logs.push({
            timestamp: new Date().toISOString(),
            store: key,
            action: `Ubah script: ${oldName} → ${newName}`,
            user_agent: navigator.userAgent
          });

          // Simpan ke Gist
          const updateRes = await fetch(gistUrl, {
            method: 'PATCH',
            headers: {
              'Authorization': `token ${CONFIG.token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              files: {
                'config.json': { content: JSON.stringify(latestConfig, null, 2) },
                'log.json': { content: JSON.stringify(logs, null, 2) }
              }
            })
          });

          if (!updateRes.ok) {
            const err = await updateRes.text();
            throw new Error('Gagal menyimpan: ' + err);
          }

          st.textContent = '✅';
          showToast('✅ Berhasil disimpan ke Gist');
          await loadFromGist(); // Refresh data dari Gist
        } catch(e) {
          st.textContent = '❌';
          showToast('❌ ' + e.message);
        }
        setTimeout(() => st.textContent = '', 2000);
      };

      function showToast(msg) {
        if (!toastEl) return;
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 3000);
      }

      window.logout = function() {
        sessionStorage.removeItem('qrlogin');
        window.location.href = 'login.html';
      };
    })();
  </script>
</body>
</html>
