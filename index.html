<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - QRIS Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; color: #2d3436; }
    .header { background: #16213e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .header h2 { color: #e94560; }
    .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
    .config-bar { background: white; padding: 15px 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .config-bar input { margin: 5px 5px 5px 0; padding: 8px; width: 220px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    .config-bar button { padding: 8px 16px; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 4px; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    th, td { border: 1px solid #eee; padding: 12px 15px; text-align: left; }
    th { background: #16213e; color: white; font-weight: 500; }
    td { font-size: 14px; }
    select, td button { padding: 6px 12px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; }
    td button { background: #00b894; color: white; border: none; }
    td button:hover { background: #00a381; }
    .status { font-size: 0.85em; color: #00b894; margin-left: 8px; }
    .logout-btn { background: #e94560; color: white; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .logout-btn:hover { background: #c23152; }
    .nav { margin-bottom: 15px; }
    .nav a { color: #16213e; text-decoration: none; margin-right: 20px; font-weight: 500; }
    .nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('qrlogin')) { window.location.href = 'login.html'; }
  </script>

  <div class="header">
    <h2>📊 Dashboard QRIS</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <div class="nav">
      <a href="index.html">🏠 Dashboard</a>
      <a href="editor.html">✏️ Editor Script</a>
    </div>

    <div class="config-bar" id="configBar" style="display: none;">
      <strong>⚙️ Pengaturan</strong><br>
      Token: <input type="password" id="tokenInput" placeholder="ghp_..."><br>
      Gist ID: <input type="text" id="gistIdInput" placeholder="xxxxxxxxxxxxxxxx"><br>
      Raw URL: <input type="text" id="rawUrlInput" placeholder="https://gist.../raw/config.json"><br>
      <button onclick="saveConfig()">Simpan & Muat</button>
    </div>

    <table>
      <thead><tr><th>Nama Toko</th><th>Script Aktif</th><th>Ubah</th><th></th></tr></thead>
      <tbody id="storeBody"></tbody>
    </table>
  </div>

  <script>
    let CONFIG = {};
    if(localStorage.adminConfig) {
      CONFIG = JSON.parse(localStorage.adminConfig);
      if(CONFIG.token && CONFIG.gistId && CONFIG.rawUrl) {
        document.getElementById('configBar').style.display = 'none';
        loadData();
      } else {
        document.getElementById('configBar').style.display = 'block';
        if(CONFIG.token) document.getElementById('tokenInput').value = CONFIG.token;
        if(CONFIG.gistId) document.getElementById('gistIdInput').value = CONFIG.gistId;
        if(CONFIG.rawUrl) document.getElementById('rawUrlInput').value = CONFIG.rawUrl;
      }
    } else {
      document.getElementById('configBar').style.display = 'block';
    }

    async function saveConfig() {
      CONFIG.token = document.getElementById('tokenInput').value.trim();
      CONFIG.gistId = document.getElementById('gistIdInput').value.trim();
      CONFIG.rawUrl = document.getElementById('rawUrlInput').value.trim();
      localStorage.adminConfig = JSON.stringify(CONFIG);
      document.getElementById('configBar').style.display = 'none';
      await loadData();
    }

    let data = {};
    async function loadData() {
      try {
        const res = await fetch(CONFIG.rawUrl);
        data = await res.json();
        renderTable();
      } catch(e) { alert('Gagal load data. Cek Raw URL.'); }
    }

    function renderTable() {
      const tbody = document.getElementById('storeBody');
      tbody.innerHTML = '';
      Object.entries(data.stores).forEach(([key, store]) => {
        const active = store.script_options[store.active_index];
        const row = tbody.insertRow();
        row.innerHTML = `
          <td><strong>${store.name}</strong></td>
          <td>${active ? active.name : '(tidak ada)'}</td>
          <td>
            <select data-key="${key}">
              ${store.script_options.map((opt,i) => `<option value="${i}" ${i===store.active_index?'selected':''}>${opt.name}</option>`).join('')}
            </select>
          </td>
          <td>
            <button onclick="updateActive('${key}')">Simpan</button>
            <span class="status" id="st-${key}"></span>
          </td>
        `;
      });
    }

    async function updateActive(key) {
      const sel = document.querySelector(`select[data-key="${key}"]`);
      const newIdx = parseInt(sel.value);
      const store = data.stores[key];
      const oldIdx = store.active_index;
      const oldName = store.script_options[oldIdx].name;
      const newName = store.script_options[newIdx].name;

      const st = document.getElementById(`st-${key}`);
      st.textContent = '⏳...';

      // Optimistic update
      store.active_index = newIdx;

      const logEntry = {
        timestamp: new Date().toISOString(),
        store: key,
        action: `Ubah script aktif: ${oldName} -> ${newName}`,
        user_agent: navigator.userAgent
      };

      try {
        const gistUrl = `https://api.github.com/gists/${CONFIG.gistId}`;
        const gistRes = await fetch(gistUrl, { headers: { 'Authorization': `token ${CONFIG.token}` } });
        const gistData = await gistRes.json();
        let logs = [];
        try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e){}
        logs.push(logEntry);

        const updateRes = await fetch(gistUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${CONFIG.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            files: {
              'config.json': { content: JSON.stringify(data, null, 2) },
              'log.json': { content: JSON.stringify(logs, null, 2) }
            }
          })
        });

        if (updateRes.ok) {
          st.textContent = '✅';
          renderTable();
        } else {
          st.textContent = '❌ Gagal';
          store.active_index = oldIdx; // rollback
        }
      } catch(e) {
        st.textContent = '❌ Error';
        store.active_index = oldIdx;
      }
    }

    function logout() {
      sessionStorage.removeItem('qrlogin');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
