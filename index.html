<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard QRIS</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 10px; }
    button { padding: 6px 12px; cursor: pointer; }
    #loading { padding: 20px; background: #f0f0f0; }
    #error { padding: 20px; background: #fee; color: red; display: none; }
  </style>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('qrlogin')) location.href = 'login.html';
  </script>
  
  <h2>Dashboard QRIS</h2>
  
  <div id="loading">⏳ Memuat data dari Gist...</div>
  <div id="error"></div>
  
  <table id="table" style="display:none;">
    <thead><tr><th>Toko</th><th>Aktif</th><th>Ubah</th><th>Aksi</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    // Ambil konfigurasi
    const cfg = JSON.parse(localStorage.adminConfig || '{}');
    
    if (!cfg.token || !cfg.rawUrl) {
      document.body.innerHTML = '<p>⚠️ <a href="index.html">Isi setup dulu</a></p>';
    }

    let stores = {};

    // FETCH DARI GIST
    fetch(cfg.rawUrl + '?t=' + Date.now())
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(data => {
        stores = data.stores;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('table').style.display = 'table';
        renderTable();
      })
      .catch(err => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').innerHTML = '❌ Gagal: ' + err.message;
      });

    function renderTable() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      Object.entries(stores).forEach(([key, store]) => {
        const active = store.script_options[store.active_index];
        tbody.innerHTML += `
          <tr>
            <td><b>${store.name}</b></td>
            <td id="name-${key}">${active ? active.name : '—'}</td>
            <td>
              <select id="sel-${key}">
                ${store.script_options.map((o,i) => `<option value="${i}" ${i===store.active_index?'selected':''}>${o.name}</option>`).join('')}
              </select>
            </td>
            <td>
              <button onclick="update('${key}')">Simpan</button>
              <span id="st-${key}"></span>
            </td>
          </tr>`;
      });
    }

    window.update = async function(key) {
      const newIdx = document.getElementById('sel-'+key).value;
      const st = document.getElementById('st-'+key);
      st.textContent = '⏳';

      try {
        // Ambil gist terbaru
        const gistUrl = `https://api.github.com/gists/${cfg.gistId}`;
        const gistRes = await fetch(gistUrl, {
          headers: { 'Authorization': `token ${cfg.token}` }
        });
        if (!gistRes.ok) throw new Error('Gagal ambil gist');
        const gistData = await gistRes.json();

        const config = JSON.parse(gistData.files['config.json'].content);
        let logs = [];
        try { logs = JSON.parse(gistData.files['log.json'].content); } catch(e) {}

        // Ubah
        config.stores[key].active_index = parseInt(newIdx);
        
        // Log
        logs.push({
          timestamp: new Date().toISOString(),
          store: key,
          action: `Ubah ke ${config.stores[key].script_options[newIdx].name}`
        });

        // Simpan
        const updateRes = await fetch(gistUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${cfg.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            files: {
              'config.json': { content: JSON.stringify(config, null, 2) },
              'log.json': { content: JSON.stringify(logs, null, 2) }
            }
          })
        });

        if (!updateRes.ok) throw new Error('Gagal simpan');

        // Update lokal & render
        stores = config.stores;
        renderTable();
        st.textContent = '✅';
        
      } catch(e) {
        st.textContent = '❌';
        alert(e.message);
      }
    };

    window.logout = function() {
      sessionStorage.removeItem('qrlogin');
      location.href = 'login.html';
    };
  </script>
</body>
</html>
